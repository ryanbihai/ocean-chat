user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;
#scp ftpuser@aiserver:/etc/nginx/nginx.conf .
#scp nginx.conf root@aiserver:/etc/nginx/

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;
# scp root@aiserver:/etc/nginx/nginx.conf .
events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

        sub_filter 'ai.ihaola.com.cn' 'ai-t.ihaola.com.cn';
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

        # 设置流量控制，具体打开某个路径的流量控制需要在server中的路径里配置
        limit_req_zone $binary_remote_addr zone=vendor-interface:1m rate=5r/s;
    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;
    server {
        listen       80;
        listen       443 ssl;
        server_name  ai.ihaola.com.cn aiserver;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate ai.pem;
        ssl_certificate_key ai.key;
        proxy_pass_header Server;
        root         /usr/share/nginx/html;

        # Load configuration files for the default server block.
        # include /etc/nginx/default.d/*.conf;
        # 允许较大的上传（按需调整）
        # 建议：增大请求头缓冲，避免浏览器大 Cookie 导致 400
        client_max_body_size 60M;
        client_header_buffer_size 16k;
        large_client_header_buffers 8 64k;

        # # 显式将根路径也代理到 Flask
        # location = / {
        #     proxy_pass http://127.0.0.1:10990;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_read_timeout 600;
        #     proxy_send_timeout 600;
        #     proxy_http_version 1.1;
        #     proxy_set_header Connection "";
        # }

        # 定制首页：访问根目录时显示 index_ai.html
        location = / {
            root /usr/share/nginx/html;
            rewrite ^ /index_ai.html break;
        }

        # Node.js Backend API
        location /api/ {
            proxy_pass http://127.0.0.1:17019;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 其他路径统一代理到 Flask（启用）
        location / {
            proxy_pass http://127.0.0.1:12601;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 注意：如 default.d 里有 location = / 会覆盖你的首页代理
        # 如遇覆盖，请移到本段之后或注释掉
        # include /etc/nginx/default.d/*.conf;

        error_page 404 /404.html;
            location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
            location = /50x.html {
        }
    }

server {
        listen 80;
        listen 443 ssl;
        server_name  ai-t.ihaola.com.cn aiserver-t;

        # 建议使用绝对路径，确保文件存在
        ssl_certificate /etc/nginx/ai-t.pem;     # 请确认路径
        ssl_certificate_key /etc/nginx/ai-t.key; # 请确认路径

        ssl_protocols TLSv1.2 TLSv1.3;

        # 优化 SSL 设置
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
        client_max_body_size 60M;
        client_header_buffer_size 16k;
        large_client_header_buffers 8 64k;

        # 定制首页：访问根目录时显示 index_ait.html
        location = / {
            root /usr/share/nginx/html;
            rewrite ^ /index_ait.html break;
        }

        # Node.js Backend API
        location /api/ {
            proxy_pass http://127.0.0.1:17019;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://127.0.0.1:12501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 这一行很重要，告诉后端当前是 https 协议，防止后端生成 http 的重定向
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /qywx/ {
            proxy_pass http://127.0.0.1:16016/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 这一行很重要，告诉后端当前是 https 协议，防止后端生成 http 的重定向
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /bot2/ {
            proxy_pass http://127.0.0.1:15173/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 这一行很重要，告诉后端当前是 https 协议，防止后端生成 http 的重定向
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
    # 内网 IP 访问配置
    # 通过内网 IP（如 http://192.168.x.x）访问时使用此配置
    server {
        listen 80 default_server;
        server_name _;  # 匹配所有未被其他 server_name 捕获的请求

        client_max_body_size 60M;
        client_header_buffer_size 16k;
        large_client_header_buffers 8 64k;

        # Node.js Backend API
        location /api/ {
            proxy_pass http://127.0.0.1:17019;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://127.0.0.1:12501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        error_page 404 /404.html;
            location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
            location = /50x.html {
        }
    }
}
